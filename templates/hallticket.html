<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall Ticket - {{uid}}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f4f4; 
            text-align: center; 
            padding: 20px;
        }
        .ticket-container { 
            background: white; 
            width: 700px; 
            margin: 0 auto; 
            padding: 40px; 
            border: 2px solid #333; 
            border-radius: 10px; 
            position: relative; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            text-align: left;
        }
        .header { 
            text-align: center;
            border-bottom: 2px solid #333; 
            margin-bottom: 30px; 
            padding-bottom: 10px; 
        }
        .header h2 { margin: 5px 0; letter-spacing: 2px; }
        .details { 
            line-height: 2.2; 
            margin-left: 10px;
            font-size: 18px;
        }
        .details strong { color: #2c3e50; width: 150px; display: inline-block; }
        
        .qr-section { 
            position: absolute; 
            top: 120px; 
            right: 50px; 
            text-align: center;
        }
        .qr-section img { 
            border: 1px solid #ddd;
            padding: 5px;
            background: #fff;
        }
        
        .footer { 
            margin-top: 50px; 
            font-size: 13px; 
            color: #555; 
            border-top: 1px dashed #ccc;
            padding-top: 20px;
            text-align: center;
        }
        .download-btn { 
            background: #007bff; 
            color: white; 
            padding: 12px 25px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-bottom: 20px; 
            font-weight: bold;
            transition: 0.3s;
        }
        .download-btn:hover { background: #0056b3; }
        
        /* Hide button when the browser prints */
        @media print { .download-btn { display: none; } }
    </style>
</head>
<body>

    <button class="download-btn" onclick="downloadPDF()">📥 Download Hall Ticket as PDF</button>

    <div id="ticket" class="ticket-container">
        <div class="header">
            <h2>EXAMINATION HALL TICKET</h2>
            <p>Annual Examination 2026</p>
        </div>

        <div class="details">
            <p><strong>Candidate ID:</strong> {{uid}}</p>
            <p><strong>Full Name:</strong> {{name}}</p>
            <p><strong>Roll Number:</strong> {{roll}}</p>
            <p><strong>Branch:</strong> {{branch}}</p>
            <p><strong>Subjects:</strong> {{subjects}}</p>
        </div>

        <div class="qr-section">
            <img src="{{qr_url}}" alt="QR Code" width="140" id="qrImage">
            <p style="font-size: 11px; margin-top: 5px; font-weight: bold;">SCAN TO VERIFY</p>
        </div>

        <div class="footer">
            <p><strong>Instruction:</strong> Please carry this ticket along with a valid Government ID proof to the exam center.</p>
            <p>Generated on: <span id="date"></span></p>
        </div>
    </div>

    <script>
        // Auto-set the current date
        document.getElementById('date').innerText = new Date().toLocaleDateString('en-GB');

        function downloadPDF() {
            const element = document.getElementById('ticket');
            
            // Critical settings to ensure QR code appears in PDF
            const opt = {
                margin:       [10, 10, 10, 10],
                filename:     'HallTicket_{{uid}}.pdf',
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { 
                    scale: 3,           // High resolution
                    useCORS: true,      // Allows capturing the external QR image
                    logging: false,
                    letterRendering: true
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Start conversion
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
