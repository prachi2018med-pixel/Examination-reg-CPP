<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Exam Hall Ticket</title>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-2xl overflow-hidden border-t-8 border-indigo-600">
        <div class="p-8">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">HALL TICKET</h1>
            
            <div class="space-y-4 mb-8">
                <p><strong>Name:</strong> {{name}}</p>
                <p><strong>Roll No:</strong> {{roll}}</p>
                <p><strong>Branch:</strong> {{branch}}</p>
                <p><strong>Subjects:</strong> {{subjects}}</p>
            </div>

            <div class="flex flex-col items-center border-t pt-6">
                <img src="{{qr_url}}" alt="QR Verification" class="w-32 h-32">
                <p class="text-xs text-gray-400 mt-2">Scan to Verify Candidate</p>
            </div>

            <button onclick="window.print()" class="w-full mt-6 bg-indigo-600 text-white font-bold py-2 rounded-lg hover:bg-indigo-700">
                Print PDF
            </button>
        </div>
    </div>
</body>
</html>
