<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - C++</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white max-w-lg w-full rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-indigo-700 p-8 text-center text-white">
            <h1 class="text-3xl font-extrabold tracking-tight">Exam Portal</h1>
            <p class="mt-2 text-indigo-100">Powered by C++ & Crow Framework</p>
        </div>

        <form action="/register" method="POST" class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Student Full Name</label>
                <input type="text" name="name" required placeholder="John Doe" 
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Roll Number</label>
                    <input type="text" name="roll_no" required placeholder="2026-XX" 
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Branch</label>
                    <select name="branch" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                        <option value="CS">Computer Science</option>
                        <option value="IT">Information Tech</option>
                        <option value="ME">Mechanical</option>
                        <option value="EE">Electrical</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-3">Select Subjects</label>
                <div class="grid grid-cols-2 gap-3">
                    <div class="flex items-center p-3 border rounded-xl hover:bg-indigo-50 transition cursor-pointer">
                        <input type="checkbox" name="subjects" value="Mathematics" class="w-4 h-4 text-indigo-600">
                        <span class="ml-3 text-sm text-gray-600">Mathematics</span>
                    </div>
                    <div class="flex items-center p-3 border rounded-xl hover:bg-indigo-50 transition cursor-pointer">
                        <input type="checkbox" name="subjects" value="Physics" class="w-4 h-4 text-indigo-600">
                        <span class="ml-3 text-sm text-gray-600">Physics</span>
                    </div>
                    <div class="flex items-center p-3 border rounded-xl hover:bg-indigo-50 transition cursor-pointer">
                        <input type="checkbox" name="subjects" value="Computing" class="w-4 h-4 text-indigo-600">
                        <span class="ml-3 text-sm text-gray-600">Computing</span>
                    </div>
                    <div class="flex items-center p-3 border rounded-xl hover:bg-indigo-50 transition cursor-pointer">
                        <input type="checkbox" name="subjects" value="English" class="w-4 h-4 text-indigo-600">
                        <span class="ml-3 text-sm text-gray-600">English</span>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all">
                Register & Generate Ticket
            </button>
        </form>
    </div>
</body>
</html>
